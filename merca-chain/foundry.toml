[profile.default]
src = "src"
out = "out"
libs = ["lib"]
remappings = ["@openzeppelin/=lib/openzeppelin-contracts/"]

[rpc_endpoints]
morph_testnet = "https://rpc-hoodi.morph.network"
morph_mainnet = "https://rpc-quicknode.morph.network"
 
[etherscan]
morph_testnet = { key = "any", url = "https://explorer-hoodi.morph.network/api?" }
morph_mainnet = { key = "any", url = "https://explorer.morph.network/api" }
 
[fuzz]
runs = 1000
 
[invariant]
runs   = 256
depth  = 15
 

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
